<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <title>Sa'ah AR</title>

  <!-- A-Frame -->
  <script src="https://aframe.io/releases/1.4.2/aframe.min.js"></script>

  <!-- WebXR AR -->
  <script src="https://cdn.jsdelivr.net/npm/aframe-ar-hit-test-component@1.0.0/dist/aframe-ar-hit-test-component.min.js"></script>

  <style>
    body { margin:0; }
    #ui {
      position:fixed;
      bottom:20px;
      left:50%;
      transform:translateX(-50%);
      z-index:10;
      background:rgba(0,0,0,0.6);
      padding:10px;
      border-radius:10px;
    }
    input { width:60px; }
  </style>
</head>

<body>

<!-- UI -->
<div id="ui">
  <input id="w" placeholder="W">
  <input id="d" placeholder="D">
  <input id="h" placeholder="H">
  <button onclick="queue()">Add</button>
</div>

<a-scene
  vr-mode-ui="enabled: false"
  renderer="logarithmicDepthBuffer: true"
  embedded
  webxr="requiredFeatures: hit-test, local-floor">

  <!-- camera -->
  <a-camera position="0 1.6 0"></a-camera>

  <!-- reticle (this is the grid base) -->
  <a-entity
    id="reticle"
    geometry="primitive: ring; radiusInner: 0.05; radiusOuter: 0.06"
    material="color: #00aaff"
    rotation="-90 0 0"
    visible="false"
    ar-hit-test="target: #reticle">
  </a-entity>

</a-scene>

<script>

// store objects
let queued = null;

// get scene + reticle
const scene = document.querySelector('a-scene');
const reticle = document.getElementById('reticle');

// queue object
function queue(){
  const w = document.getElementById("w").value;
  const d = document.getElementById("d").value;
  const h = document.getElementById("h").value;

  if(!w || !d || !h){
    alert("enter all values");
    return;
  }

  queued = {w,d,h};
}

// place object when screen tapped
scene.addEventListener('click', () => {

  if(!queued || !reticle.getAttribute('visible')) return;

  const pos = reticle.getAttribute('position');

  const box = document.createElement('a-box');

  // convert cm → meters
  box.setAttribute('width', queued.w / 100);
  box.setAttribute('depth', queued.d / 100);
  box.setAttribute('height', queued.h / 100);

  box.setAttribute('position', {
    x: pos.x,
    y: pos.y + (queued.h/200), // lift it above floor
    z: pos.z
  });

  box.setAttribute('material', 'opacity: 0.5; color: #00aaff');

  // add drag movement
  box.setAttribute('draggable', '');

  scene.appendChild(box);

  queued = null;
});

</script>

</body>
</html>
