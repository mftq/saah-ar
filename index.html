<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, user-scalable=no, minimum-scale=1.0, maximum-scale=1.0" />
  <title>سعة — AR Space Organizer</title>

  <!--
    We use A-Frame + AR.js with the Hiro marker.
    This is the most reliable approach that works on ALL phones
    including iPhone and Android without any extra setup.
    The user points at the Hiro marker and sees 3D boxes appear on it.
    This is exactly like Lab 1 but way more advanced in terms of features.
  -->
  <script src="https://aframe.io/releases/1.6.0/aframe.min.js"></script>
  <script src="https://raw.githack.com/AR-js-org/AR.js/3.4.7/aframe/build/aframe-ar.js"></script>

  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600&family=Space+Mono:wght@700&display=swap" rel="stylesheet" />

  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --blue:   #4A9EFF;
      --orange: #FF8C42;
      --green:  #4ade80;
      --red:    #f87171;
      --yellow: #facc15;
      --bg:     rgba(8,12,24,0.9);
      --border: rgba(74,158,255,0.2);
      --text:   #E8F0FF;
      --muted:  #4A6080;
    }

    body {
      font-family: 'DM Sans', sans-serif;
      background: #000;
      color: var(--text);
      overflow: hidden;
      height: 100vh;
      width: 100vw;
    }

    /* fix the AR scene to fill the whole screen */
    a-scene {
      position: fixed !important;
      top: 0; left: 0;
      width: 100% !important;
      height: 100% !important;
      z-index: 0;
    }

    /* fix the video camera feed to fill screen */
    video {
      position: fixed !important;
      top: 0 !important; left: 0 !important;
      width: 100vw !important;
      height: 100vh !important;
      object-fit: cover !important;
      z-index: 0 !important;
    }

    canvas {
      position: fixed !important;
      top: 0 !important; left: 0 !important;
      width: 100vw !important;
      height: 100vh !important;
      z-index: 1 !important;
    }

    /* UI sits on top of everything */
    #ui {
      position: fixed;
      top: 0; left: 0;
      width: 100%; height: 100%;
      z-index: 10;
      pointer-events: none;
      display: flex;
      flex-direction: column;
      justify-content: space-between;
    }

    /* ── top bar ── */
    .topbar {
      pointer-events: all;
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 14px 18px;
      background: var(--bg);
      backdrop-filter: blur(16px);
      border-bottom: 1px solid var(--border);
    }

    .logo {
      font-family: 'Space Mono', monospace;
      font-size: 18px;
      font-weight: 700;
      color: var(--blue);
    }
    .logo em { color: var(--orange); font-style: normal; }

    #capBadge {
      font-family: 'Space Mono', monospace;
      font-size: 11px;
      padding: 5px 12px;
      border-radius: 100px;
      background: rgba(74,158,255,0.1);
      border: 1px solid var(--border);
      color: var(--blue);
    }

    .topbar-hint {
      font-size: 10px;
      color: var(--muted);
      font-family: 'Space Mono', monospace;
      text-align: right;
      line-height: 1.4;
    }

    /* ── middle hint ── */
    #midHint {
      pointer-events: none;
      position: fixed;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      text-align: center;
    }

    .hint-ring {
      width: 100px; height: 100px;
      border: 2px solid rgba(74,158,255,0.6);
      border-radius: 50%;
      margin: 0 auto 14px;
      animation: pulse 2s ease-in-out infinite;
    }

    @keyframes pulse {
      0%,100% { transform: scale(1); opacity: 0.8; }
      50%      { transform: scale(1.1); opacity: 0.4; }
    }

    .hint-pill {
      background: var(--bg);
      backdrop-filter: blur(8px);
      border: 1px solid var(--border);
      border-radius: 100px;
      padding: 8px 16px;
      font-size: 12px;
      font-family: 'Space Mono', monospace;
      color: var(--text);
      white-space: nowrap;
    }

    /* ── fit panel top right ── */
    #fitPanel {
      pointer-events: none;
      position: fixed;
      top: 76px; right: 12px;
      background: var(--bg);
      backdrop-filter: blur(10px);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 10px 14px;
      font-family: 'Space Mono', monospace;
      font-size: 11px;
      min-width: 145px;
    }

    #fitPanel h4 {
      font-size: 9px;
      letter-spacing: 2px;
      text-transform: uppercase;
      color: var(--muted);
      margin-bottom: 5px;
    }

    .ok   { color: var(--green); }
    .warn { color: var(--yellow); }
    .bad  { color: var(--red); }

    /* ── bottom panel ── */
    #bottomPanel {
      pointer-events: all;
      background: var(--bg);
      backdrop-filter: blur(20px);
      border-top: 1px solid var(--border);
    }

    .tabs {
      display: flex;
      border-bottom: 1px solid var(--border);
    }

    .tab {
      flex: 1;
      background: transparent;
      border: none;
      border-bottom: 2px solid transparent;
      color: var(--muted);
      font-family: 'DM Sans', sans-serif;
      font-size: 13px;
      font-weight: 500;
      padding: 11px 6px;
      cursor: pointer;
      transition: all 0.2s;
      text-align: center;
    }

    .tab.active {
      color: var(--blue);
      border-bottom-color: var(--blue);
    }

    .tab-pane { display: none; padding: 14px 16px; }
    .tab-pane.active { display: block; }

    /* form */
    .form-grid {
      display: grid;
      grid-template-columns: 2fr 1fr 1fr 1fr;
      gap: 8px;
      margin-bottom: 10px;
    }

    .field label {
      display: block;
      font-size: 10px;
      color: var(--muted);
      font-family: 'Space Mono', monospace;
      text-transform: uppercase;
      letter-spacing: 1px;
      margin-bottom: 4px;
    }

    .field input {
      width: 100%;
      background: rgba(10,14,26,0.9);
      border: 1px solid var(--border);
      color: var(--text);
      border-radius: 8px;
      padding: 9px 10px;
      font-family: 'DM Sans', sans-serif;
      font-size: 14px;
      outline: none;
      transition: border-color 0.2s;
    }

    .field input:focus { border-color: var(--blue); }

    /* color swatches */
    .swatches {
      display: flex;
      align-items: center;
      gap: 8px;
      margin-bottom: 12px;
      flex-wrap: wrap;
    }

    .swatches label {
      font-size: 10px;
      color: var(--muted);
      font-family: 'Space Mono', monospace;
      text-transform: uppercase;
      letter-spacing: 1px;
    }

    .swatch {
      width: 24px; height: 24px;
      border-radius: 50%;
      cursor: pointer;
      border: 2px solid transparent;
      transition: transform 0.15s, border-color 0.15s;
      display: inline-block;
    }
    .swatch:hover { transform: scale(1.2); }
    .swatch.sel { border-color: white; transform: scale(1.2); }

    /* buttons */
    .btn {
      border: none;
      border-radius: 10px;
      padding: 11px 14px;
      font-family: 'DM Sans', sans-serif;
      font-size: 14px;
      font-weight: 600;
      cursor: pointer;
      transition: opacity 0.2s, transform 0.1s;
    }
    .btn:active { transform: scale(0.97); }
    .btn:hover  { opacity: 0.88; }
    .btn-full   { width: 100%; }
    .btn-blue   { background: var(--blue);   color: white; }
    .btn-orange { background: var(--orange); color: white; }
    .btn-ghost  { background: transparent; border: 1px solid var(--border); color: var(--muted); }
    .btn-danger { background: rgba(248,113,113,0.12); border: 1px solid rgba(248,113,113,0.3); color: var(--red); }

    /* object list */
    #objList {
      max-height: 120px;
      overflow-y: auto;
      display: flex;
      flex-direction: column;
      gap: 6px;
      margin-bottom: 10px;
    }

    .obj-card {
      display: flex;
      align-items: center;
      gap: 10px;
      background: rgba(74,158,255,0.04);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 8px 12px;
      cursor: pointer;
      transition: all 0.2s;
    }
    .obj-card:hover  { border-color: rgba(74,158,255,0.4); }
    .obj-card.active { border-color: var(--blue); background: rgba(74,158,255,0.08); }

    .obj-dot { width: 12px; height: 12px; border-radius: 3px; flex-shrink: 0; }
    .obj-info { flex: 1; min-width: 0; }
    .obj-name { font-size: 13px; font-weight: 500; }
    .obj-dim  { font-size: 10px; color: var(--muted); font-family: 'Space Mono', monospace; }

    .obj-del {
      background: none; border: none;
      color: var(--muted); cursor: pointer; font-size: 16px;
      padding: 2px 6px; border-radius: 4px;
      transition: color 0.2s;
    }
    .obj-del:hover { color: var(--red); }

    .btn-row { display: flex; gap: 8px; }

    .empty {
      text-align: center;
      color: var(--muted);
      font-size: 12px;
      padding: 12px 0;
      font-family: 'Space Mono', monospace;
    }

    ::-webkit-scrollbar { width: 4px; }
    ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }
  </style>
</head>
<body>

<!--
  ════════════════════════════════════════
  AR SCENE using A-Frame + AR.js
  The user points at a Hiro marker.
  All the 3D boxes appear on top of the marker.
  This works on ALL phones - iPhone and Android.
  ════════════════════════════════════════
-->
<a-scene
  embedded
  arjs="sourceType: webcam; debugUIEnabled: false;"
  vr-mode-ui="enabled: false"
  renderer="logarithmicDepthBuffer: true; antialias: true;"
>

  <!-- Hiro marker - everything inside appears on top of it -->
  <a-marker
    id="marker"
    preset="hiro"
    smooth="true"
    smoothCount="10"
    smoothTolerance="0.01"
    smoothThreshold="5"
  >

    <!-- the floor grid of the space -->
    <a-plane
      rotation="-90 0 0"
      width="3" height="3"
      color="#080C18"
      opacity="0.7"
      material="transparent: true; side: double"
    ></a-plane>

    <!-- grid lines - horizontal -->
    <a-box position="0 0.002 -1"   width="3" height="0.003" depth="0.01" color="#4A9EFF" opacity="0.3" material="transparent:true"></a-box>
    <a-box position="0 0.002 -0.5" width="3" height="0.003" depth="0.01" color="#4A9EFF" opacity="0.3" material="transparent:true"></a-box>
    <a-box position="0 0.002  0"   width="3" height="0.003" depth="0.01" color="#4A9EFF" opacity="0.3" material="transparent:true"></a-box>
    <a-box position="0 0.002  0.5" width="3" height="0.003" depth="0.01" color="#4A9EFF" opacity="0.3" material="transparent:true"></a-box>
    <a-box position="0 0.002  1"   width="3" height="0.003" depth="0.01" color="#4A9EFF" opacity="0.3" material="transparent:true"></a-box>

    <!-- grid lines - vertical -->
    <a-box position="-1   0.002 0" width="0.01" height="0.003" depth="3" color="#4A9EFF" opacity="0.3" material="transparent:true"></a-box>
    <a-box position="-0.5 0.002 0" width="0.01" height="0.003" depth="3" color="#4A9EFF" opacity="0.3" material="transparent:true"></a-box>
    <a-box position=" 0   0.002 0" width="0.01" height="0.003" depth="3" color="#4A9EFF" opacity="0.3" material="transparent:true"></a-box>
    <a-box position=" 0.5 0.002 0" width="0.01" height="0.003" depth="3" color="#4A9EFF" opacity="0.3" material="transparent:true"></a-box>
    <a-box position=" 1   0.002 0" width="0.01" height="0.003" depth="3" color="#4A9EFF" opacity="0.3" material="transparent:true"></a-box>

    <!-- space boundary walls (transparent blue walls to show the space) -->
    <a-box position="0 0.5  1.5" width="3" height="1" depth="0.02" color="#4A9EFF" opacity="0.08" material="transparent:true"></a-box>
    <a-box position="0 0.5 -1.5" width="3" height="1" depth="0.02" color="#4A9EFF" opacity="0.08" material="transparent:true"></a-box>
    <a-box position=" 1.5 0.5 0" width="0.02" height="1" depth="3" color="#4A9EFF" opacity="0.08" material="transparent:true"></a-box>
    <a-box position="-1.5 0.5 0" width="0.02" height="1" depth="3" color="#4A9EFF" opacity="0.08" material="transparent:true"></a-box>

    <!-- this is where all the user's boxes go -->
    <a-entity id="boxContainer"></a-entity>

  </a-marker>

  <!-- camera needed for AR.js -->
  <a-entity camera></a-entity>

</a-scene>


<!--
  ════════════════════════════════════════
  UI OVERLAY
  ════════════════════════════════════════
-->
<div id="ui">

  <!-- top bar -->
  <div class="topbar">
    <div class="logo">سعة <em>·</em> Sa'ah</div>
    <div id="capBadge">0 objects</div>
    <div class="topbar-hint">Point at<br/>Hiro marker</div>
  </div>

  <!-- scanning hint shown in the middle of the screen -->
  <div id="midHint">
    <div class="hint-ring"></div>
    <div class="hint-pill" id="hintText">Point camera at Hiro marker 🎯</div>
  </div>

  <!-- fit analysis -->
  <div id="fitPanel">
    <h4>Fit Analysis</h4>
    <div id="fitStatus" class="ok">Add objects to start</div>
  </div>

  <!-- bottom panel -->
  <div id="bottomPanel">

    <div class="tabs">
      <button class="tab active" onclick="showTab('add',this)">➕ Add Object</button>
      <button class="tab"        onclick="showTab('list',this)">📦 Objects</button>
      <button class="tab"        onclick="showTab('space',this)">📐 Space</button>
    </div>

    <!-- ADD TAB -->
    <div class="tab-pane active" id="tab-add">
      <div class="form-grid">
        <div class="field">
          <label>Name</label>
          <input type="text" id="objName" placeholder="Clothes Box" />
        </div>
        <div class="field">
          <label>W cm</label>
          <input type="number" id="objW" placeholder="50" min="5" />
        </div>
        <div class="field">
          <label>D cm</label>
          <input type="number" id="objD" placeholder="40" min="5" />
        </div>
        <div class="field">
          <label>H cm</label>
          <input type="number" id="objH" placeholder="30" min="5" />
        </div>
      </div>
      <div class="swatches">
        <label>Color</label>
        <div id="swatchRow"></div>
      </div>
      <button class="btn btn-blue btn-full" onclick="addObject()">Place in AR Scene</button>
    </div>

    <!-- LIST TAB -->
    <div class="tab-pane" id="tab-list">
      <div id="objList">
        <div class="empty">No objects yet!</div>
      </div>
      <div class="btn-row">
        <button class="btn btn-ghost"  style="flex:1;font-size:12px" onclick="rotateSelected()">↻ Rotate</button>
        <button class="btn btn-danger" style="flex:1;font-size:12px" onclick="removeSelected()">✕ Remove</button>
        <button class="btn btn-danger" style="flex:1;font-size:12px" onclick="clearAll()">🗑 All</button>
      </div>
    </div>

    <!-- SPACE TAB -->
    <div class="tab-pane" id="tab-space">
      <p style="font-size:11px;color:var(--muted);margin-bottom:10px;font-family:'Space Mono',monospace">
        Set the real size of the space you want to fill:
      </p>
      <div class="btn-row" style="margin-bottom:10px;flex-wrap:wrap;gap:6px">
        <button class="btn btn-ghost" style="font-size:12px;padding:7px 10px" onclick="setPreset(120,100,80)">🚗 Car Boot</button>
        <button class="btn btn-ghost" style="font-size:12px;padding:7px 10px" onclick="setPreset(35,20,45)">🎒 Backpack</button>
        <button class="btn btn-ghost" style="font-size:12px;padding:7px 10px" onclick="setPreset(50,25,70)">🧳 Suitcase</button>
        <button class="btn btn-ghost" style="font-size:12px;padding:7px 10px" onclick="setPreset(90,40,200)">📦 Shelf</button>
      </div>
      <div class="form-grid" style="grid-template-columns:1fr 1fr 1fr">
        <div class="field">
          <label>W cm</label>
          <input type="number" id="spaceW" value="120" />
        </div>
        <div class="field">
          <label>D cm</label>
          <input type="number" id="spaceD" value="100" />
        </div>
        <div class="field">
          <label>H cm</label>
          <input type="number" id="spaceH" value="80" />
        </div>
      </div>
      <button class="btn btn-orange btn-full" onclick="applySpace()">Apply Space</button>
    </div>

  </div>
</div>


<script>
// ════════════════════════════════════════
// APP STATE
// ════════════════════════════════════════
const app = {
  objects:     [],           // all objects added by user
  selectedId:  null,         // currently selected object id
  nextId:      1,            // auto increment id
  color:       '#4A9EFF',    // currently picked color
  space:       { w:120, d:100, h:80 }, // space dimensions in cm

  // available colors
  colors: ['#4A9EFF','#FF8C42','#4ade80','#f472b6','#facc15','#a78bfa','#f87171','#34d399'],

  // grid positions where boxes get placed (x, z in A-Frame units)
  // we have a 3x3 unit grid so positions go from -1 to 1
  slots: [
    [-0.8, 0.8], [0, 0.8], [0.8, 0.8],
    [-0.8, 0  ], [0, 0  ], [0.8, 0  ],
    [-0.8,-0.8], [0,-0.8], [0.8,-0.8],
  ],
};

// 1 cm = this many A-Frame units
// we use 1 unit = 100cm so 50cm = 0.5 units
const CM = 0.01;

// ════════════════════════════════════════
// BUILD COLOR SWATCHES
// ════════════════════════════════════════
function buildSwatches() {
  const row = document.getElementById('swatchRow');
  app.colors.forEach(c => {
    const s = document.createElement('div');
    s.className = 'swatch' + (c === app.color ? ' sel' : '');
    s.style.background = c;
    s.onclick = () => {
      // deselect all then select this one
      document.querySelectorAll('.swatch').forEach(x => x.classList.remove('sel'));
      s.classList.add('sel');
      app.color = c;
    };
    row.appendChild(s);
  });
}
buildSwatches();

// ════════════════════════════════════════
// TABS
// ════════════════════════════════════════
function showTab(name, btn) {
  document.querySelectorAll('.tab-pane').forEach(p => p.classList.remove('active'));
  document.querySelectorAll('.tab').forEach(b => b.classList.remove('active'));
  document.getElementById('tab-' + name).classList.add('active');
  btn.classList.add('active');
}

// ════════════════════════════════════════
// SPACE PRESETS
// ════════════════════════════════════════
function setPreset(w, d, h) {
  document.getElementById('spaceW').value = w;
  document.getElementById('spaceD').value = d;
  document.getElementById('spaceH').value = h;
  applySpace();
}

function applySpace() {
  app.space.w = +document.getElementById('spaceW').value || 120;
  app.space.d = +document.getElementById('spaceD').value || 100;
  app.space.h = +document.getElementById('spaceH').value || 80;
  updateFit();
}

// ════════════════════════════════════════
// ADD OBJECT TO AR SCENE
// ════════════════════════════════════════
function addObject() {
  const name = document.getElementById('objName').value.trim() || 'Box';
  const w    = parseFloat(document.getElementById('objW').value);
  const d    = parseFloat(document.getElementById('objD').value);
  const h    = parseFloat(document.getElementById('objH').value);

  if (!w || !d || !h) {
    alert('Please fill in all dimensions (W, D, H)!');
    return;
  }

  // warn if object is too big for the space
  if (w > app.space.w || d > app.space.d) {
    if (!confirm(`This object (${w}×${d}cm) might be too big for the space (${app.space.w}×${app.space.d}cm). Add anyway?`)) return;
  }

  const id  = app.nextId++;
  const idx = app.objects.length % app.slots.length; // pick next slot
  const pos = app.slots[idx];

  const obj = { id, name, w, d, h, color: app.color, rot: 0 };
  app.objects.push(obj);

  // convert cm to A-Frame units
  const aw = w * CM;
  const ad = d * CM;
  const ah = h * CM;

  // create the A-Frame entity for this box
  const container = document.getElementById('boxContainer');

  const parent = document.createElement('a-entity');
  parent.id = 'obj-' + id;
  // y = half height so box sits on the floor, not inside it
  parent.setAttribute('position', `${pos[0]} ${ah/2} ${pos[1]}`);

  // the actual 3D box
  const box = document.createElement('a-box');
  box.id = 'box-' + id;
  box.setAttribute('width',  aw);
  box.setAttribute('height', ah);
  box.setAttribute('depth',  ad);
  box.setAttribute('material', `color: ${obj.color}; opacity: 0.72; transparent: true`);

  // wireframe overlay for that AR look
  const wire = document.createElement('a-box');
  wire.id = 'wire-' + id;
  wire.setAttribute('width',  aw + 0.005);
  wire.setAttribute('height', ah + 0.005);
  wire.setAttribute('depth',  ad + 0.005);
  wire.setAttribute('material', `wireframe: true; color: ${obj.color}`);

  // text label floating above the box
  const label = document.createElement('a-text');
  label.setAttribute('value', `${name}\n${w}x${d}x${h}cm`);
  label.setAttribute('align', 'center');
  label.setAttribute('color', '#ffffff');
  label.setAttribute('scale', '0.22 0.22 0.22');
  label.setAttribute('position', `0 ${ah/2 + 0.08} 0`);
  label.setAttribute('look-at', '[camera]');

  parent.appendChild(box);
  parent.appendChild(wire);
  parent.appendChild(label);
  container.appendChild(parent);

  // clear the input fields
  document.getElementById('objName').value = '';
  document.getElementById('objW').value    = '';
  document.getElementById('objD').value    = '';
  document.getElementById('objH').value    = '';

  renderList();
  updateFit();
  setHint('✓ ' + name + ' placed in AR!');
  setTimeout(() => setHint('Point camera at Hiro marker 🎯'), 2500);
}

// ════════════════════════════════════════
// SELECT OBJECT (highlights it)
// ════════════════════════════════════════
function selectObj(id) {
  app.selectedId = id;

  app.objects.forEach(o => {
    const box = document.getElementById('box-' + o.id);
    if (!box) return;
    if (o.id === id) {
      // pulse animation to show selection
      box.setAttribute('animation', 'property: scale; from: 1 1 1; to: 1.1 1.1 1.1; loop: true; dur: 500; dir: alternate; easing: easeInOutSine');
    } else {
      box.removeAttribute('animation');
      box.setAttribute('scale', '1 1 1');
    }
  });

  renderList();
}

// ════════════════════════════════════════
// ROTATE SELECTED (swaps W and D = 90 deg)
// ════════════════════════════════════════
function rotateSelected() {
  if (!app.selectedId) { alert('Select an object from the list first!'); return; }
  const obj = app.objects.find(o => o.id === app.selectedId);
  if (!obj) return;

  // swap width and depth to simulate rotation
  [obj.w, obj.d] = [obj.d, obj.w];

  // update the 3D box dimensions
  const box  = document.getElementById('box-' + obj.id);
  const wire = document.getElementById('wire-' + obj.id);
  if (box)  { box.setAttribute('width',  obj.w * CM); box.setAttribute('depth',  obj.d * CM); }
  if (wire) { wire.setAttribute('width', obj.w * CM + 0.005); wire.setAttribute('depth', obj.d * CM + 0.005); }

  renderList();
}

// ════════════════════════════════════════
// REMOVE OBJECTS
// ════════════════════════════════════════
function removeSelected() {
  if (!app.selectedId) { alert('Select an object from the list first!'); return; }
  removeById(app.selectedId);
}

function removeById(id) {
  const el = document.getElementById('obj-' + id);
  if (el) el.parentNode.removeChild(el);
  app.objects    = app.objects.filter(o => o.id !== id);
  if (app.selectedId === id) app.selectedId = null;
  renderList();
  updateFit();
}

function clearAll() {
  if (!app.objects.length) return;
  if (!confirm('Remove all objects from the AR scene?')) return;
  app.objects.forEach(o => {
    const el = document.getElementById('obj-' + o.id);
    if (el) el.parentNode.removeChild(el);
  });
  app.objects    = [];
  app.selectedId = null;
  renderList();
  updateFit();
}

// ════════════════════════════════════════
// RENDER OBJECT LIST IN SIDEBAR
// ════════════════════════════════════════
function renderList() {
  const list = document.getElementById('objList');
  document.getElementById('capBadge').textContent =
    app.objects.length + ' object' + (app.objects.length !== 1 ? 's' : '');

  if (!app.objects.length) {
    list.innerHTML = '<div class="empty">No objects yet!</div>';
    return;
  }

  list.innerHTML = '';
  app.objects.forEach(o => {
    const card = document.createElement('div');
    card.className = 'obj-card' + (o.id === app.selectedId ? ' active' : '');
    card.innerHTML = `
      <div class="obj-dot" style="background:${o.color}"></div>
      <div class="obj-info">
        <div class="obj-name">${o.name}</div>
        <div class="obj-dim">${o.w}×${o.d}×${o.h} cm</div>
      </div>
      <button class="obj-del" onclick="removeById(${o.id});event.stopPropagation()">×</button>
    `;
    card.onclick = () => selectObj(o.id);
    list.appendChild(card);
  });
}

// ════════════════════════════════════════
// FIT ANALYSIS
// Calculates how full the space is
// ════════════════════════════════════════
function updateFit() {
  const spaceVol = app.space.w * app.space.d * app.space.h;
  const usedVol  = app.objects.reduce((sum, o) => sum + o.w * o.d * o.h, 0);
  const pct      = Math.min(100, Math.round((usedVol / spaceVol) * 100));
  const el       = document.getElementById('fitStatus');

  if (!app.objects.length) {
    el.className = 'ok'; el.textContent = 'Add objects to start'; return;
  }

  if (pct < 60)      { el.className = 'ok';   el.textContent = `✓ ${pct}% full\nLooks good!`; }
  else if (pct < 85) { el.className = 'warn'; el.textContent = `⚠ ${pct}% full\nGetting tight`; }
  else               { el.className = 'bad';  el.textContent = `✗ ${pct}% full\nWon't fit!`; }
}

// ════════════════════════════════════════
// HINT TEXT IN THE MIDDLE
// ════════════════════════════════════════
function setHint(msg) {
  document.getElementById('hintText').textContent = msg;
}

// ════════════════════════════════════════
// MARKER DETECTION EVENTS
// Hide the hint when marker is found
// ════════════════════════════════════════
document.addEventListener('DOMContentLoaded', () => {
  const marker = document.getElementById('marker');
  if (!marker) return;

  marker.addEventListener('markerFound', () => {
    // hide the pulsing hint when marker is detected
    document.getElementById('midHint').style.opacity = '0';
    setHint('✓ Marker found! Objects are in AR');
  });

  marker.addEventListener('markerLost', () => {
    document.getElementById('midHint').style.opacity = '1';
    setHint('Point camera at Hiro marker 🎯');
  });
});
</script>
</body>
